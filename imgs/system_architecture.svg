<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Kien truc he thong QLNS QLVB QLKH tren Odoo</title>
  <desc id="desc">So do kien truc gom nguoi dung, client, Odoo server, cac custom addons, PostgreSQL va Google Gemini API.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .server { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 16; }
      .db { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .ai { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 14; }
      .module { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; rx: 10; }
      .external { fill: #fefce8; stroke: #eab308; stroke-width: 2; rx: 14; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .arrow-ai { stroke: #7c3aed; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead-ai); }
      .arrow-data { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead-db); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowhead-ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowhead-db" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="600" y="52" text-anchor="middle" class="title">Kien truc he thong ERP QLNS - QLVB - QLKH</text>
  <text x="600" y="78" text-anchor="middle" class="subtitle">Odoo Web UI, custom addons, PostgreSQL, External App va Google Gemini API</text>

  <rect x="56" y="130" width="190" height="100" class="panel"/>
  <text x="151" y="164" text-anchor="middle" class="label">Nguoi dung</text>
  <text x="151" y="190" text-anchor="middle" class="small">Admin / HR / Quan ly</text>
  <text x="151" y="210" text-anchor="middle" class="small">Nhan vien</text>

  <rect x="56" y="300" width="190" height="92" class="panel"/>
  <text x="151" y="335" text-anchor="middle" class="label">Khach hang</text>
  <text x="151" y="361" text-anchor="middle" class="small">Nhap / tra cuu du lieu</text>

  <rect x="318" y="122" width="218" height="118" class="panel"/>
  <text x="427" y="155" text-anchor="middle" class="label">Web Browser</text>
  <text x="427" y="181" text-anchor="middle" class="small">Odoo Web UI</text>
  <text x="427" y="203" text-anchor="middle" class="tiny">http://localhost:8069</text>

  <rect x="318" y="286" width="218" height="122" class="external"/>
  <text x="427" y="320" text-anchor="middle" class="label">External App 8070</text>
