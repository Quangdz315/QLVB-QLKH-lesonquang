  <text x="736" y="329" text-anchor="middle" class="label">QLVB</text>
  <text x="736" y="351" text-anchor="middle" class="tiny">quan_ly_van_ban</text>

  <rect x="868" y="300" width="180" height="70" class="module"/>
  <text x="958" y="329" text-anchor="middle" class="label">QLKH</text>
  <text x="958" y="351" text-anchor="middle" class="tiny">quan_ly_khach_hang_van_ban</text>

  <rect x="646" y="398" width="180" height="70" class="ai"/>
  <text x="736" y="427" text-anchor="middle" class="label">Tro ly AI</text>
  <text x="736" y="449" text-anchor="middle" class="tiny">AI Assistant Widget</text>

  <rect x="868" y="398" width="180" height="70" class="ai"/>
  <text x="958" y="427" text-anchor="middle" class="label">Gemini Service</text>
  <text x="958" y="449" text-anchor="middle" class="tiny">Tich hop API AI</text>

  <path d="M 536 181 L 610 181" class="arrow"/>
  <text x="573" y="168" text-anchor="middle" class="tiny">HTTP</text>

  <path d="M 536 347 L 610 347" class="arrow"/>
  <text x="573" y="334" text-anchor="middle" class="tiny">XML-RPC</text>

  <path d="M 246 180 L 318 180" class="arrow"/>
  <path d="M 246 346 L 318 346" class="arrow"/>

  <path d="M 735 272 L 735 300" class="arrow"/>
  <path d="M 826 237 L 868 237" class="arrow"/>
  <path d="M 826 335 L 868 335" class="arrow"/>
  <path d="M 958 370 L 958 398" class="arrow-ai"/>
  <path d="M 826 433 L 868 433" class="arrow-ai"/>

  <rect x="646" y="570" width="180" height="90" class="db"/>
  <text x="736" y="607" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="736" y="633" text-anchor="middle" class="small">Database</text>

  <rect x="868" y="570" width="180" height="90" class="ai"/>
  <text x="958" y="607" text-anchor="middle" class="label">Google Gemini API</text>
  <text x="958" y="633" text-anchor="middle" class="small">Tom tat / phan tich / goi y</text>

  <path d="M 736 468 L 736 570" class="arrow-data"/>
  <path d="M 958 468 L 958 570" class="arrow-ai"/>

  <rect x="92" y="560" width="430" height="94" class="panel"/>
  <text x="307" y="592" text-anchor="middle" class="label">Lien ket nghiep vu chinh</text>
  <text x="307" y="618" text-anchor="middle" class="small">QLNS cap du lieu nhan su cho QLVB va QLKH</text>
  <text x="307" y="640" text-anchor="middle" class="small">QLVB gan van ban vao ho so khach hang</text>
</svg>
