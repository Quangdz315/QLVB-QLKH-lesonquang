  <text x="736" y="231" text-anchor="middle" class="label">QLNS</text>
  <text x="736" y="253" text-anchor="middle" class="tiny">nhan_su</text>

  <rect x="868" y="202" width="180" height="70" class="module"/>
  <text x="958" y="231" text-anchor="middle" class="label">Cham cong &amp; Luong</text>
  <text x="958" y="253" text-anchor="middle" class="tiny">quan_ly_cham_cong_luong</text>

