  <text x="227" y="1124" text-anchor="middle" class="dark label">Client</text>
  <text x="227" y="1152" text-anchor="middle" class="muted small">Browser / App 8070</text>

  <rect x="410" y="1088" width="240" height="86" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="530" y="1124" text-anchor="middle" class="dark label">Odoo Server</text>
  <text x="530" y="1152" text-anchor="middle" class="muted small">Models / Views / Security</text>

  <rect x="738" y="1060" width="170" height="78" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="823" y="1094" text-anchor="middle" class="dark label">PostgreSQL</text>
  <text x="823" y="1120" text-anchor="middle" class="muted small">Database</text>

