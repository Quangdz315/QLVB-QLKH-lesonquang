<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1700" viewBox="0 0 1200 1700" role="img" aria-labelledby="title desc">
  <title id="title">Poster ERP Quan ly khach hang va van ban</title>
  <desc id="desc">Poster gioi thieu he thong ERP quan ly nhan su, khach hang va van ban tren Odoo.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.48" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .hero { fill: url(#hero); }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; rx: 24; }
      .soft { fill: url(#soft); stroke: #cbd5e1; stroke-width: 2; rx: 22; }
      .dark { fill: #0f172a; }
      .muted { fill: #475569; }
      .white { fill: #ffffff; }
      .teal { fill: #0f766e; }
      .blue { fill: #2563eb; }
      .violet { fill: #7c3aed; }
      .orange { fill: #f97316; }
      .title { font: 800 54px Arial, sans-serif; letter-spacing: 0; }
      .subtitle { font: 500 24px Arial, sans-serif; }
      .section { font: 800 28px Arial, sans-serif; }
      .label { font: 700 22px Arial, sans-serif; }
      .body { font: 400 18px Arial, sans-serif; }
      .small { font: 400 15px Arial, sans-serif; }
      .tiny { font: 400 13px Arial, sans-serif; }
      .chip { fill: #e0f2fe; stroke: #7dd3fc; stroke-width: 1.4; rx: 16; }
      .line { stroke: #94a3b8; stroke-width: 2.2; fill: none; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1700"/>

  <rect x="0" y="0" width="1200" height="360" class="hero"/>
  <text x="600" y="70" text-anchor="middle" class="white small">AIoTLab - Faculty of Information Technology - DaiNam University</text>
  <text x="600" y="146" text-anchor="middle" class="white title">ERP: QUAN LY KHACH HANG</text>
  <text x="600" y="210" text-anchor="middle" class="white title">&amp; VAN BAN</text>
  <text x="600" y="264" text-anchor="middle" class="white subtitle">He thong Odoo tich hop QLNS - QLVB - QLKH - AI Assistant</text>
  <rect x="382" y="298" width="436" height="42" rx="21" fill="#ffffff" opacity="0.16"/>
  <text x="600" y="326" text-anchor="middle" class="white body">Thuc tap doanh nghiep - Nhom 10 - CNTT 17-02</text>

  <rect x="72" y="410" width="1056" height="170" class="card"/>
  <text x="106" y="462" class="dark section">Muc tieu he thong</text>
  <text x="106" y="508" class="muted body">So hoa quy trinh quan ly nhan su, khach hang va van ban tren nen tang Odoo.</text>
  <text x="106" y="540" class="muted body">Lien ket du lieu tap trung, giam thao tac thu cong, ho tro theo doi trang thai va ra quyet dinh nhanh hon.</text>

